name = "voice-alarm-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "development"

[[r2_buckets]]
binding = "VOICE_BUCKET"
bucket_name = "voice-alarm-voices"

[triggers]
crons = ["*/5 * * * *"]

# 실제 배포 시 wrangler secret put 으로 설정
# PERSO_API_KEY = ""
# ELEVENLABS_API_KEY = ""
# TURSO_DATABASE_URL = ""
# TURSO_AUTH_TOKEN = ""
# FIREBASE_PROJECT_ID = ""
# JWT_SECRET = ""          # 자체 발급 JWT HS256 서명 시크릿 (최소 32자 권장)
# PASSWORD_PEPPER = ""     # bcrypt 해싱 전에 비밀번호에 덧붙일 서버측 페퍼
